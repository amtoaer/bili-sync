name: Build Main Binary And Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

env:
  DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY != '' && vars.DOCKERHUB_REPOSITORY || 'bili-yt-sync-rs' }}

jobs:
  build-binary:
    uses: ./.github/workflows/build-binary.yaml
  github-release:
    name: Create GitHub Release
    needs: build-binary
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Download release artifact
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          assets=(bili-sync-rs*)
          if (( ${#assets[@]} == 0 )); then
            echo "::error::No release assets matched bili-sync-rs*"
            exit 1
          fi

          repo="${GITHUB_REPOSITORY}"
          tag="${GITHUB_REF_NAME}"

          if gh release view "${tag}" --repo "${repo}" >/dev/null 2>&1; then
            gh release edit "${tag}" --repo "${repo}" --draft --title "${tag}"
            gh release upload "${tag}" "${assets[@]}" --repo "${repo}" --clobber
          else
            gh release create "${tag}" "${assets[@]}" --repo "${repo}" --draft --title "${tag}" --verify-tag
          fi
  docker-release:
    name: Create Docker Image
    needs: build-binary
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Download release artifact
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
      - name: Resolve Docker tag
        id: docker_tag
        shell: bash
        run: |
          ref_name="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${ref_name}" =~ ^v(.+)$ ]]; then
            docker_tag="${BASH_REMATCH[1]}"
          else
            docker_tag="${ref_name}"
          fi
          echo "value=${docker_tag}" >> "${GITHUB_OUTPUT}"
      - name: Resolve Docker image tags
        id: docker_tags
        shell: bash
        run: |
          repo="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPOSITORY }}"
          {
            echo "value<<EOF"
            echo "${repo}:latest"
            echo "${repo}:${{ steps.docker_tag.outputs.value }}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"
      # Pin temporary Node 24-compatible commits until Docker publishes stable tags with the new runtime.
      - name: Docker Meta
        id: meta
        uses: docker/metadata-action@c3b064c6d7c32446d6bc214ea075f1caad2de35a
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPOSITORY }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@f4e8deed0c3c26542279f4042c0e1d059cbf012d
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@21162887f0d6e25b4e8eafb0cf44cf9bf7f6acd3
      - name: Login to DockerHub
        uses: docker/login-action@bb555fc48dca4deb5f227b07c7304c673b5708f0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@83bfd93ab480705a7b99a2ed02765137f5ab55ba
        with:
          context: .
          file: Dockerfile
          platforms: |
            linux/amd64
            linux/arm64
            linux/arm/v7
          push: true
          tags: ${{ steps.docker_tags.outputs.value }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha, scope=${{ github.workflow }}
          cache-to: type=gha, scope=${{ github.workflow }}
