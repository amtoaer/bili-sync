name: Build Main Binary And Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

env:
  DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY != '' && vars.DOCKERHUB_REPOSITORY || 'bili-yt-sync-rs' }}

jobs:
  build-binary:
    uses: ./.github/workflows/build-binary.yaml
  github-release:
    name: Create GitHub Release
    needs: build-binary
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Download release artifact
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: bili-sync-rs*
          tag_name: ${{ github.ref_name }}
          draft: true
  docker-release:
    name: Create Docker Image
    needs: build-binary
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Download release artifact
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
      - name: Resolve Docker tag
        id: docker_tag
        shell: bash
        run: |
          ref_name="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${ref_name}" =~ ^v(.+)$ ]]; then
            docker_tag="${BASH_REMATCH[1]}"
          else
            docker_tag="${ref_name}"
          fi
          echo "value=${docker_tag}" >> "${GITHUB_OUTPUT}"
      - name: Resolve Docker image tags
        id: docker_tags
        shell: bash
        run: |
          repo="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPOSITORY }}"
          {
            echo "value<<EOF"
            echo "${repo}:latest"
            echo "${repo}:${{ steps.docker_tag.outputs.value }}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"
      - name: Docker Meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPOSITORY }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: |
            linux/amd64
            linux/arm64
            linux/arm/v7
          push: true
          tags: ${{ steps.docker_tags.outputs.value }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha, scope=${{ github.workflow }}
          cache-to: type=gha, scope=${{ github.workflow }}
      - name: Update DockerHub description
        continue-on-error: true
        uses: peter-evans/dockerhub-description@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPOSITORY }}
